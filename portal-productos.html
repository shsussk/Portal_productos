<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline de Productos Externos · I+D</title>
  <style>
    :root {
      --color-cream-50: rgba(252,252,249,1);
      --color-cream-100: rgba(255,255,253,1);
      --color-gray-200: rgba(245,245,245,1);
      --color-gray-300: rgba(167,169,169,1);
      --color-gray-400: rgba(119,124,124,1);
      --color-slate-500: rgba(98,108,113,1);
      --color-brown-600: rgba(94,82,64,1);
      --color-charcoal-700: rgba(31,33,33,1);
      --color-charcoal-800: rgba(38,40,40,1);
      --color-slate-900: rgba(19,52,59,1);
      --color-teal-300: rgba(50,184,198,1);
      --color-teal-400: rgba(45,166,178,1);
      --color-teal-500: rgba(33,128,141,1);
      --color-teal-600: rgba(29,116,128,1);
      --color-teal-700: rgba(26,104,115,1);
      --color-red-400: rgba(255,84,89,1);
      --color-red-500: rgba(192,21,47,1);
      --color-orange-400: rgba(230,129,97,1);
      --color-orange-500: rgba(168,75,47,1);
      --color-brown-600-rgb: 94,82,64;
      --color-teal-500-rgb: 33,128,141;
      --color-slate-900-rgb: 19,52,59;
      --color-slate-500-rgb: 98,108,113;
      --color-red-500-rgb: 192,21,47;
      --color-orange-500-rgb: 168,75,47;
      --color-success-rgb: 33,128,141;
      --color-error-rgb: 192,21,47;
      --color-warning-rgb: 168,75,47;
      --color-info-rgb: 98,108,113;

      --color-background: var(--color-cream-50);
      --color-surface: var(--color-cream-100);
      --color-text: var(--color-slate-900);
      --color-text-secondary: var(--color-slate-500);
      --color-primary: var(--color-teal-500);
      --color-primary-hover: var(--color-teal-600);
      --color-primary-active: var(--color-teal-700);
      --color-secondary: rgba(var(--color-brown-600-rgb),0.12);
      --color-secondary-hover: rgba(var(--color-brown-600-rgb),0.2);
      --color-border: rgba(var(--color-brown-600-rgb),0.2);
      --color-card-border: rgba(var(--color-brown-600-rgb),0.12);
      --color-error: var(--color-red-500);
      --color-success: var(--color-teal-500);
      --color-warning: var(--color-orange-500);
      --color-info: var(--color-slate-500);

      --font-family-base: "FKGroteskNeue","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --font-size-xs:11px;--font-size-sm:12px;--font-size-base:14px;
      --font-size-lg:16px;--font-size-xl:18px;--font-size-2xl:20px;--font-size-3xl:24px;--font-size-4xl:30px;
      --font-weight-medium:500;--font-weight-semibold:550;--font-weight-bold:600;
      --line-height-tight:1.2;--line-height-normal:1.5;
      --space-4:4px;--space-6:6px;--space-8:8px;--space-10:10px;
      --space-12:12px;--space-16:16px;--space-20:20px;--space-24:24px;--space-32:32px;
      --radius-sm:6px;--radius-base:8px;--radius-md:10px;--radius-lg:12px;--radius-full:9999px;
      --shadow-sm:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,0.04),0 2px 4px -1px rgba(0,0,0,0.02);
      --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.04),0 4px 6px -2px rgba(0,0,0,0.02);
      --duration-fast:150ms;--duration-normal:250ms;
      --ease-standard:cubic-bezier(0.16,1,0.3,1);
    }
    @media(prefers-color-scheme:dark){:root{
      --color-background:var(--color-charcoal-700);
      --color-surface:var(--color-charcoal-800);
      --color-text:var(--color-gray-200);
      --color-text-secondary:rgba(167,169,169,0.7);
      --color-primary:var(--color-teal-300);
      --color-primary-hover:var(--color-teal-400);
      --color-secondary:rgba(119,124,124,0.15);
      --color-secondary-hover:rgba(119,124,124,0.25);
      --color-border:rgba(119,124,124,0.3);
      --color-card-border:rgba(119,124,124,0.2);
    }}
    *,*::before,*::after{box-sizing:border-box}
    html{font-size:var(--font-size-base);font-family:var(--font-family-base);line-height:var(--line-height-normal);color:var(--color-text);background:var(--color-background);-webkit-font-smoothing:antialiased}
    body{margin:0;padding:0}
    h1,h2,h3,h4{margin:0;font-weight:var(--font-weight-semibold);line-height:var(--line-height-tight);color:var(--color-text)}

    .app-header{padding:var(--space-16) var(--space-24);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-12);border-bottom:1px solid var(--color-border)}
    .app-header h1{font-size:var(--font-size-2xl);display:flex;align-items:center;gap:var(--space-8)}
    .header-actions{display:flex;gap:var(--space-8);align-items:center;flex-wrap:wrap}

    .btn{display:inline-flex;align-items:center;justify-content:center;padding:var(--space-8) var(--space-16);
      border-radius:var(--radius-base);font-size:var(--font-size-base);font-weight:500;cursor:pointer;
      border:none;transition:all var(--duration-normal) var(--ease-standard);text-decoration:none;gap:var(--space-6)}
    .btn--primary{background:var(--color-primary);color:var(--color-cream-50)}
    .btn--primary:hover{background:var(--color-primary-hover)}
    .btn--secondary{background:var(--color-secondary);color:var(--color-text)}
    .btn--secondary:hover{background:var(--color-secondary-hover)}
    .btn--danger{background:rgba(var(--color-error-rgb),0.12);color:var(--color-error)}
    .btn--danger:hover{background:rgba(var(--color-error-rgb),0.2)}
    .btn--success{background:rgba(var(--color-success-rgb),0.12);color:var(--color-success)}
    .btn--warning{background:rgba(var(--color-warning-rgb),0.12);color:var(--color-warning)}
    .btn--sm{padding:var(--space-4) var(--space-12);font-size:var(--font-size-sm);border-radius:var(--radius-sm)}

    .kpi-bar{display:flex;gap:var(--space-12);padding:var(--space-16) var(--space-24);overflow-x:auto;flex-wrap:wrap}
    .kpi-card{background:var(--color-surface);border:1px solid var(--color-card-border);border-radius:var(--radius-lg);padding:var(--space-12) var(--space-16);min-width:140px;flex:1}
    .kpi-card .kpi-value{font-size:var(--font-size-3xl);font-weight:var(--font-weight-bold);color:var(--color-primary)}
    .kpi-card .kpi-label{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:var(--space-4)}

    .filters-bar{display:flex;gap:var(--space-12);padding:0 var(--space-24) var(--space-16);flex-wrap:wrap;align-items:flex-end}
    .filter-group{display:flex;flex-direction:column;gap:var(--space-4)}
    .filter-group label{font-size:var(--font-size-xs);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em}
    .filter-group select,.filter-group input{padding:var(--space-6) var(--space-10);border-radius:var(--radius-base);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font-size:var(--font-size-sm);min-width:140px}

    .view-toggle{display:flex;gap:2px;background:var(--color-secondary);border-radius:var(--radius-base);padding:2px}
    .view-toggle button{padding:var(--space-6) var(--space-12);border:none;background:transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:var(--font-size-sm);color:var(--color-text-secondary);font-weight:var(--font-weight-medium)}
    .view-toggle button.active{background:var(--color-surface);color:var(--color-text);box-shadow:var(--shadow-sm)}

    .kanban-container{display:flex;gap:var(--space-12);padding:0 var(--space-24) var(--space-24);overflow-x:auto;min-height:60vh}
    .kanban-column{min-width:260px;max-width:300px;flex:1;display:flex;flex-direction:column;gap:var(--space-8)}
    .kanban-column-header{padding:var(--space-10) var(--space-12);border-radius:var(--radius-lg) var(--radius-lg) 0 0;font-weight:var(--font-weight-semibold);font-size:var(--font-size-sm);display:flex;align-items:center;justify-content:space-between}
    .kanban-column-body{flex:1;display:flex;flex-direction:column;gap:var(--space-8);padding:var(--space-8);background:var(--color-secondary);border-radius:0 0 var(--radius-lg) var(--radius-lg);min-height:100px;transition:background var(--duration-fast)}
    .kanban-column-body.drag-over{background:rgba(var(--color-teal-500-rgb),0.1)}
    .col-recibido .kanban-column-header{background:rgba(var(--color-info-rgb),0.15);color:var(--color-info)}
    .col-info-incompleta .kanban-column-header{background:rgba(var(--color-warning-rgb),0.15);color:var(--color-warning)}
    .col-en-evaluacion .kanban-column-header{background:rgba(59,130,246,0.12);color:rgb(59,130,246)}
    .col-aprobado-reunion .kanban-column-header{background:rgba(var(--color-success-rgb),0.15);color:var(--color-success)}
    .col-propuesto-ensayo .kanban-column-header{background:rgba(147,51,234,0.12);color:rgb(147,51,234)}
    .col-ensayo-campo .kanban-column-header{background:rgba(var(--color-teal-500-rgb),0.18);color:var(--color-primary)}
    .col-cerrado .kanban-column-header{background:rgba(var(--color-success-rgb),0.2);color:var(--color-success)}
    .col-rechazado .kanban-column-header{background:rgba(var(--color-error-rgb),0.12);color:var(--color-error)}
    .col-count{background:rgba(0,0,0,0.1);border-radius:var(--radius-full);padding:2px 8px;font-size:var(--font-size-xs)}

    .product-card{background:var(--color-surface);border:1px solid var(--color-card-border);border-radius:var(--radius-md);padding:var(--space-12);cursor:grab;transition:all var(--duration-fast);position:relative}
    .product-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
    .product-card.dragging{opacity:0.5;transform:rotate(2deg)}
    .product-card-name{font-weight:var(--font-weight-semibold);font-size:var(--font-size-base);margin-bottom:var(--space-4)}
    .product-card-empresa{font-size:var(--font-size-xs);color:var(--color-text-secondary)}
    .product-card-meta{display:flex;gap:var(--space-6);margin-top:var(--space-8);flex-wrap:wrap}
    .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:var(--font-size-xs);font-weight:var(--font-weight-medium)}
    .tag-tipo{background:rgba(59,130,246,0.1);color:rgb(59,130,246)}
    .tag-cultivo{background:rgba(34,197,94,0.1);color:rgb(34,197,94)}
    .tag-score{font-weight:var(--font-weight-bold);font-size:var(--font-size-sm)}
    .tag-score.high{background:rgba(var(--color-success-rgb),0.15);color:var(--color-success)}
    .tag-score.medium{background:rgba(59,130,246,0.12);color:rgb(59,130,246)}
    .tag-score.low{background:rgba(var(--color-warning-rgb),0.12);color:var(--color-warning)}
    .tag-score.none{background:rgba(var(--color-error-rgb),0.12);color:var(--color-error)}

    .table-container{padding:0 var(--space-24) var(--space-24);display:none}
    .table-container.active{display:block}
    .data-table{width:100%;border-collapse:collapse;background:var(--color-surface);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--color-card-border)}
    .data-table th{background:var(--color-secondary);padding:var(--space-10) var(--space-12);text-align:left;font-size:var(--font-size-xs);text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-secondary);font-weight:var(--font-weight-semibold)}
    .data-table td{padding:var(--space-10) var(--space-12);border-bottom:1px solid var(--color-card-border);font-size:var(--font-size-sm)}
    .data-table tr:hover td{background:var(--color-secondary)}
    .data-table tr{cursor:pointer}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;padding:var(--space-20);overflow-y:auto}
    .modal-overlay.active{display:flex;align-items:flex-start;justify-content:center}
    .modal{background:var(--color-surface);border-radius:var(--radius-lg);max-width:900px;width:100%;box-shadow:var(--shadow-lg);margin:40px auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:var(--space-16) var(--space-20);border-bottom:1px solid var(--color-border)}
    .modal-header h2{font-size:var(--font-size-xl)}
    .modal-close{background:none;border:none;font-size:var(--font-size-xl);cursor:pointer;color:var(--color-text-secondary);padding:var(--space-4)}
    .modal-body{padding:var(--space-20)}
    .modal-footer{padding:var(--space-12) var(--space-20);border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:var(--space-8)}

    .tabs{display:flex;gap:0;border-bottom:2px solid var(--color-border);margin-bottom:var(--space-16)}
    .tab-btn{padding:var(--space-10) var(--space-16);border:none;background:none;cursor:pointer;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px}
    .tab-btn.active{color:var(--color-primary);border-bottom-color:var(--color-primary)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-12)}
    .form-group{margin-bottom:var(--space-12)}
    .form-group label{display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:var(--space-4)}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:var(--space-8) var(--space-12);border-radius:var(--radius-base);border:1px solid var(--color-border);background:var(--color-background);color:var(--color-text);font-size:var(--font-size-base);font-family:inherit}
    .form-group textarea{min-height:70px;resize:vertical}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--color-primary);border-color:var(--color-primary)}

    .score-grid{display:grid;grid-template-columns:1fr auto;gap:var(--space-8) var(--space-16);align-items:center}
    .score-label{font-size:var(--font-size-sm);color:var(--color-text)}
    .star-rating{display:flex;gap:2px}
    .star-rating button{background:none;border:none;font-size:20px;cursor:pointer;padding:0 2px;opacity:0.3}
    .star-rating button.filled{opacity:1}

    .score-result{margin-top:var(--space-16);padding:var(--space-16);border-radius:var(--radius-md);text-align:center}
    .score-number{font-size:var(--font-size-4xl);font-weight:var(--font-weight-bold)}
    .score-category{font-size:var(--font-size-lg);font-weight:var(--font-weight-semibold);margin-top:var(--space-4)}

    .timeline{position:relative;padding-left:24px}
    .timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--color-border)}
    .timeline-item{position:relative;margin-bottom:var(--space-16);padding-left:var(--space-12)}
    .timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-surface)}
    .timeline-date{font-size:var(--font-size-xs);color:var(--color-text-secondary)}
    .timeline-text{font-size:var(--font-size-sm);margin-top:var(--space-4)}

    .reunion-card{border:1px solid var(--color-card-border);border-radius:var(--radius-md);padding:var(--space-12);margin-bottom:var(--space-8)}
    .reunion-card h4{font-size:var(--font-size-sm);margin-bottom:var(--space-4)}
    .reunion-card p{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin:0}

    .empty-state{text-align:center;padding:var(--space-32);color:var(--color-text-secondary);font-size:var(--font-size-sm)}

    @media(max-width:900px){
      .kanban-container{flex-direction:column}
      .kanban-column{max-width:100%;min-width:100%}
      .form-row{grid-template-columns:1fr}
    }
    @font-face{font-family:'FKGroteskNeue';src:url('https://r2cdn.perplexity.ai/fonts/FKGroteskNeue.woff2') format('woff2')}
  </style>
</head>
<body>

<header class="app-header">
  <h1>🧪 Pipeline de Productos Externos</h1>
  <div class="header-actions">
    <div class="view-toggle">
      <button class="active" onclick="setView('kanban')" id="btnViewKanban">📋 Kanban</button>
      <button onclick="setView('table')" id="btnViewTable">📊 Tabla</button>
    </div>
    <button class="btn btn--primary" onclick="openNewProductModal()">+ Nuevo Producto</button>
    <a href="ensayos.html" class="btn btn--secondary">← Ensayos</a>
  </div>
</header>

<section class="kpi-bar" id="kpiBar"></section>

<section class="filters-bar">
  <div class="filter-group">
    <label>Empresa</label>
    <select id="filtroEmpresa" onchange="renderAll()"><option value="">Todas</option></select>
  </div>
  <div class="filter-group">
    <label>Tipo producto</label>
    <select id="filtroTipo" onchange="renderAll()">
      <option value="">Todos</option>
      <option value="fungicida">Fungicida</option>
      <option value="insecticida">Insecticida</option>
      <option value="bioestimulante">Bioestimulante</option>
      <option value="poscosecha">Poscosecha</option>
      <option value="fertilizante">Fertilizante</option>
      <option value="biologico">Biológico</option>
      <option value="otro">Otro</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Cultivo</label>
    <select id="filtroCultivo" onchange="renderAll()">
      <option value="">Todos</option>
      <option value="banano">Banano</option>
      <option value="citricos">Cítricos</option>
      <option value="ambos">Ambos</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Buscar</label>
    <input type="text" id="filtroBuscar" placeholder="Nombre, empresa..." oninput="renderAll()">
  </div>
</section>

<main class="kanban-container" id="kanbanView"></main>

<div class="table-container" id="tableView">
  <table class="data-table">
    <thead>
      <tr>
        <th>Producto</th><th>Empresa</th><th>Tipo</th><th>Cultivo</th>
        <th>Puntuación</th><th>Estado</th><th>Fecha ingreso</th><th>Decisión</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Modal nuevo producto -->
<div class="modal-overlay" id="modalProducto">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalProductoTitulo">Registrar Producto</h2>
      <button class="modal-close" onclick="closeModal('modalProducto')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Empresa *</label>
          <select id="prod_empresa" required>
            <option value="">Seleccionar o crear nueva...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nueva empresa (si no existe)</label>
          <input type="text" id="prod_nueva_empresa" placeholder="Nombre de la empresa">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nombre comercial *</label>
          <input type="text" id="prod_nombre" required>
        </div>
        <div class="form-group">
          <label>Ingrediente activo</label>
          <input type="text" id="prod_ia">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tipo de producto *</label>
          <select id="prod_tipo">
            <option value="fungicida">Fungicida</option>
            <option value="insecticida">Insecticida</option>
            <option value="bioestimulante">Bioestimulante</option>
            <option value="poscosecha">Poscosecha</option>
            <option value="fertilizante">Fertilizante</option>
            <option value="biologico">Biológico</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Modo de acción</label>
          <input type="text" id="prod_modo_accion">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cultivos objetivo</label>
          <select id="prod_cultivo">
            <option value="banano">Banano</option>
            <option value="citricos">Cítricos</option>
            <option value="ambos">Ambos</option>
          </select>
        </div>
        <div class="form-group">
          <label>Problema que resuelve *</label>
          <input type="text" id="prod_problema" placeholder="Ej: Sigatoka, corona, ácaro...">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>País de origen</label>
          <input type="text" id="prod_pais">
        </div>
        <div class="form-group">
          <label>¿Registrado en RD?</label>
          <select id="prod_registro_rd">
            <option value="no">No</option>
            <option value="si">Sí</option>
            <option value="tramite">En trámite</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Contacto (nombre, email, teléfono)</label>
        <input type="text" id="prod_contacto" placeholder="Juan Pérez, juan@empresa.com, 809-555-1234">
      </div>
      <div class="form-group">
        <label>Notas adicionales</label>
        <textarea id="prod_notas"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn--secondary" onclick="closeModal('modalProducto')">Cancelar</button>

<script>
if (!window.DB) window.DB = {};

// ===== Helpers específicos de productos (no tocan DB.ensayos) =====
DB.empresas = {
  async listar() {
    return await supabase
      .from('empresas')
      .select('*')
      .eq('activa', true)
      .order('nombre');
  },
  async crear(datos) {
    datos.id = datos.id || 'emp_' + Date.now();
    return await supabase
      .from('empresas')
      .insert(datos)
      .select()
      .single();
  }
};

DB.productos_externos = {
  async listar() {
    return await supabase
      .from('productos_externos')
      .select('*')
      .order('creado_en', { ascending: false });
  },
  async crear(datos) {
    datos.id = datos.id || 'prod_' + Date.now();
    return await supabase
      .from('productos_externos')
      .insert(datos)
      .select()
      .single();
  },
  async actualizar(id, datos) {
    return await supabase
      .from('productos_externos')
      .update(datos)
      .eq('id', id)
      .select()
      .single();
  },
  async eliminar(id) {
    return await supabase
      .from('productos_externos')
      .delete()
      .eq('id', id);
  },
  async cambiarEstado(id, nuevoEstado, estadoPublico, mensajePublico) {
    const updates = { estado: nuevoEstado };
    if (estadoPublico) updates.estado_publico = estadoPublico;
    if (mensajePublico) updates.mensaje_publico = mensajePublico;
    return await supabase
      .from('productos_externos')
      .update(updates)
      .eq('id', id)
      .select()
      .single();
  }
};

DB.evaluaciones_producto = {
  async crear(datos) {
    datos.id = datos.id || 'eval_' + Date.now();
    return await supabase
      .from('evaluaciones_producto')
      .insert(datos)
      .select()
      .single();
  }
};

DB.reuniones_producto = {
  async listarPorProducto(productoId) {
    return await supabase
      .from('reuniones_producto')
      .select('*')
      .eq('producto_id', productoId)
      .order('fecha_reunion', { ascending: false });
  },
  async crear(datos) {
    datos.id = datos.id || 'reu_' + Date.now();
    return await supabase
      .from('reuniones_producto')
      .insert(datos)
      .select()
      .single();
  }
};

DB.historial_producto = {
  async listarPorProducto(productoId) {
    return await supabase
      .from('historial_producto')
      .select('*')
      .eq('producto_id', productoId)
      .order('fecha', { ascending: false });
  },
  async registrar(productoId, accion, detalle) {
    return await supabase
      .from('historial_producto')
      .insert({
        id: 'hist_' + Date.now(),
        producto_id: productoId,
        accion,
        detalle,
        realizado_por: window.SESION ? window.SESION.nombre : 'I+D'
      });
  }
};

async function crearPreEnsayoDesdeProducto(productoId) {
  const { data: producto, error: errProd } = await DB.productos_externos.listar();
  if (errProd) return { error: errProd };
  const p = (producto || []).find(x => x.id === productoId);
  if (!p) return { error: { message: 'Producto no encontrado' } };

  const ensayoId = 'ens_' + Date.now();
  const nuevoEnsayo = {
    id: ensayoId,
    area: 'I+D - Productos externos',
    reportado_por: 'Portal proveedores',
    fecha_inicio: null,
    prioridad: p.categoria_evaluacion === 'prioridad_alta' ? 'Alta' : 'Media',
    responsable_id: window.SESION ? window.SESION.nombre : 'I+D',
    validador_campo: '',
    metrica_objetivo: 'Evaluar ' + p.nombre_comercial + ' para ' + p.problema_objetivo,
    estado: 'activo',
    roi_estimado: 0,
    porcentaje_avance: 0,
    exito: false,
    publicaciones: [],
    producto_externo_id: productoId
  };
  const { data: ensayo, error: errEns } = await DB.ensayos.crear(nuevoEnsayo);
  if (errEns) return { error: errEns };

  await DB.productos_externos.actualizar(productoId, {
    estado: 'ensayo_campo',
    ensayo_id: ensayoId,
    estado_publico: 'En ensayo de campo',
    mensaje_publico: 'Su producto ha sido aprobado y se inició un ensayo de campo en nuestras fincas.'
  });
  await DB.historial_producto.registrar(
    productoId,
    'Pre-ensayo creado',
    'Ensayo ID: ' + ensayoId + ' — ' + nuevoEnsayo.metrica_objetivo
  );
  return { data: ensayo, ensayoId };
}
