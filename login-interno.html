<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso interno · Productos externos</title>
  <style>
    :root {
      --bg: #f7f8f5;
      --surface: #ffffff;
      --surface-2: #f3f6f6;
      --text: #16343b;
      --muted: #66757b;
      --primary: #21808d;
      --primary-hover: #1d7480;
      --border: rgba(94, 82, 64, 0.18);
      --danger: #c0152f;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #e3f1f3, #f7f8f5 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 24px 22px 22px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: rgba(33,128,141,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-weight: 800;
      color: var(--primary);
      font-size: 20px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    p.muted {
      margin: 6px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .form-group label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .form-control {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 600;
      font-size: 14px;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      gap: 8px;
      flex-wrap: wrap;
    }

    .notice {
      display: none;
      margin-bottom: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(192,21,47,.25);
      background: rgba(192,21,47,.06);
      color: var(--danger);
      font-size: 13px;
    }

    .notice.ok {
      border-color: rgba(33,128,141,.25);
      background: rgba(33,128,141,.06);
      color: var(--primary);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    a.link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    a.link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">R</div>
    <h1>Acceso interno</h1>
    <p class="muted">Solo personal autorizado del área de investigación.</p>

    <div id="alertBox" class="notice"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo institucional</label>
        <input
          id="email"
          type="email"
          class="form-control"
          autocomplete="username"
          required
          placeholder="tu.correo@empresa.com"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          class="form-control"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="checkbox-row">
        <input id="remember" type="checkbox" />
        <label for="remember">Recordar sesión en este navegador</label>
      </div>

      <button type="submit" class="btn btn-primary" id="btnLogin">
        Entrar al portal interno
      </button>
    </form>

    <div class="footer">
      <span id="envInfo">Verificando sesión...</span>
      <a href="index.html" class="link">Volver al portal público</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    const alertBox = document.getElementById('alertBox');
    const envInfo = document.getElementById('envInfo');
    const btnLogin = document.getElementById('btnLogin');
    const form = document.getElementById('loginForm');

    function showAlert(message, ok = false) {
      alertBox.textContent = message;
      alertBox.style.display = 'block';
      alertBox.classList.toggle('ok', ok);
    }

    function hideAlert() {
      alertBox.style.display = 'none';
      alertBox.classList.remove('ok');
    }

    async function checkExistingSession() {
      try {
        if (!window.supabase) {
          envInfo.textContent = 'Error cargando Supabase.';
          return;
        }

        const { data, error } = await window.supabase.auth.getSession();
        if (error) throw error;

        if (data.session) {
          envInfo.textContent = 'Sesión activa. Redirigiendo...';
          window.location.href = 'portal-productos.html';
        } else {
          envInfo.textContent = 'Ingresa con tu correo y contraseña.';
        }
      } catch (err) {
        console.error(err);
        envInfo.textContent = 'No se pudo verificar la sesión.';
      }
    }

    async function loginInterno(event) {
      event.preventDefault();
      hideAlert();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (!email || !password) {
        showAlert('Completa correo y contraseña.');
        return;
      }

      try {
        btnLogin.disabled = true;
        btnLogin.textContent = 'Entrando...';

        // persistencia de sesión: local (browser) o solo sesión
        await window.supabase.auth.setSession({
          access_token: null,
          refresh_token: null
        });
        // Nota: en v2 la persistencia se configura al crear el cliente;
        // si quieres controlar aquí, deberías crear un cliente separado.

        const { data, error } = await window.supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          console.error(error);
          showAlert('Error de acceso: ' + (error.message || 'credenciales inválidas.'));
          btnLogin.disabled = false;
          btnLogin.textContent = 'Entrar al portal interno';
          return;
        }

        showAlert('Acceso correcto. Redirigiendo...', true);
        window.location.href = 'portal-productos.html';
      } catch (err) {
        console.error(err);
        showAlert('No se pudo iniciar sesión: ' + (err.message || err), false);
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar al portal interno';
      }
    }

    form.addEventListener('submit', loginInterno);
    document.addEventListener('DOMContentLoaded', checkExistingSession);
  </script>
</body>
</html>
